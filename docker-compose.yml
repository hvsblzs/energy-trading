services:

  # ── MySQL ────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: energy-trading-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: energy_trading
    ports:
      - "3306:3306"
    volumes:
      # Az adatbázis adatai itt tárolódnak a gépen
      # Újraindítás után sem vesznek el
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Docker rendszeresen ellenőrzi hogy a MySQL ténylegesen készen áll
      # Nem elég hogy a konténer elindult - a MySQL indulása tovább tart
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy-trading-network

  # ── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: energy-trading-rabbitmq
    ports:
      - "5672:5672"    # AMQP port - Java app ezen kommunikál
      - "15672:15672"  # Management UI - böngészőből elérhető
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy-trading-network

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: energy-trading-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - energy-trading-network

  # ── Spring Boot Backend ───────────────────────────────────
  backend:
    build:
      context: ./energy-trading-backend
      dockerfile: Dockerfile
    container_name: energy-trading-backend
    ports:
      - "8080:8080"
    environment:
      # MySQL
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/energy_trading?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      # JPA beállítások
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_TIME_ZONE: UTC
      SPRING_JPA_SHOW_SQL: "false"

      # Flyway
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"

      # RabbitMQ
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000

      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # NAV RabbitMQ topic nevek
      NAV_RABBITMQ_EXCHANGE: nav.exchange
      NAV_RABBITMQ_QUEUE_TRANSACTIONS: nav.transactions
      NAV_RABBITMQ_QUEUE_REVENUE: nav.revenue
      NAV_RABBITMQ_ROUTING_KEY_TRANSACTIONS: nav.transactions
      NAV_RABBITMQ_ROUTING_KEY_REVENUE: nav.revenue
      NAV_SCHEDULE_TRANSACTIONS: 60000
      NAV_SCHEDULE_REVENUE: 300000

      # Kafka topic nevek
      KAFKA_TOPIC_RESOURCE_TYPES: resource-types
      KAFKA_TOPIC_PRICING_CHANGES: pricing-changes
      KAFKA_TOPIC_RESOURCE_TYPES_REQUEST: resource-types-request

    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - energy-trading-network

  # ── Angular Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./energy-trading-frontend
      dockerfile: Dockerfile
    container_name: energy-trading-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - energy-trading-network

  # ── Pricing Logger (.NET) ─────────────────────────────────
  pricing-logger:
    build:
      context: ./energy-trading-price-logger/pricing-logger-dotnet
      dockerfile: Dockerfile
    container_name: energy-trading-pricing-logger
    environment:
      # Kafka - belső port 29092
      Kafka__BootstrapServers: kafka:29092
      Kafka__ConsumerGroupId: pricing-logger-group
      Kafka__Topics__PricingChanges: pricing-changes
      # CSV fájlok mentési helye a konténerben
      Logger__OutputDirectory: /app/logs
      Logger__FileName: pricing-changes.csv
    volumes:
      # A CSV fájlok itt tárolódnak a gépeden
      # ./logs mappa az EnergyTradingProject gyökérben jön létre
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - energy-trading-network

  # ── Ngrok ────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: energy-trading-ngrok
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http --domain=pseudobiological-nondeciduously-audrianna.ngrok-free.dev backend:8080
    ports:
      - "4040:4040"
    depends_on:
      - backend
    networks:
      - energy-trading-network

# ── Volumes ───────────────────────────────────────────────
# Named volumes: Docker kezeli ezeket, nem egy konkrét mappa
# Adatok megmaradnak docker-compose down után is
# Csak docker-compose down -v törli őket
volumes:
  mysql_data:
  rabbitmq_data:
  kafka_data:

# ── Network ───────────────────────────────────────────────
# Minden service ugyanazon a hálózaton van
# Így látják egymást service névvel (pl. "mysql", "kafka")
networks:
  energy-trading-network:
    driver: bridge