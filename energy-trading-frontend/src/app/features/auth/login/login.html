<div class="min-h-screen bg-gray-950 flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-800">

        <!-- Logó / Cím -->
         <div class="text-center mb-8">
            <img src="energy-logo.png" alt="Energy Trading Logo" class="h-20 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-white mb-2">Energy Trading</h1>
            <p class="text-gray-400 text-sm">Jelentkezz be a folytatáshoz</p>
         </div>

         <!-- Hibaüzenet -->
          @if (errorMessage) {
            <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-6 text-sm">
                {{errorMessage}}
            </div>
          }

          <!-- Form -->
           <div class="space-y-5">
            <div>
                <label class="block text-gray-400 text-sm mb-2">Email</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="email@example.com" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div>
                <label class="block text-gray-400 text-sm mb-2">Jelszó</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="........" class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <button (click)="login()" [disabled]="isLoading" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-900 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors mt-2">
                {{isLoading ? 'Bejelentkezés...' : 'Bejelentkezés'}}
            </button>
           </div>
    </div>
</div>
@if (showInactivityModal) {
  <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 max-w-sm w-full mx-4 text-center">
      <div class="w-12 h-12 rounded-full bg-yellow-500/15 border border-yellow-500/30 flex items-center justify-center mx-auto mb-4">
        <lucide-icon [img]="Clock" class="w-6 h-6 text-yellow-400"></lucide-icon>
      </div>
      <h3 class="text-white font-semibold text-lg mb-2">
        {{ inactivityMessage.includes('lejárt') ? 'Munkamenet lejárt' : 'Automatikus kijelentkezés' }}
      </h3>
      <p class="text-gray-400 text-sm mb-6">{{ inactivityMessage }}</p>
      <button
        (click)="showInactivityModal = false"
        class="w-full px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl transition-colors">
        Rendben
      </button>
    </div>
  </div>
}
