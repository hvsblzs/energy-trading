<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-sm">

  <div class="flex items-center justify-between p-6 border-b border-gray-800">
    <div>
      <h2 class="text-white font-semibold">Feltöltés</h2>
      <p class="text-gray-500 text-xs mt-0.5">{{ data.resourceType }}</p>
    </div>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4">
    <div class="flex items-center justify-between text-sm">
      <span class="text-gray-400">Jelenlegi készlet:</span>
      <span class="text-white font-medium">{{ data.quantity | number:'1.0-0' }} {{ data.unit }}</span>
    </div>
    <div class="flex items-center justify-between text-sm">
      <span class="text-gray-400">Max kapacitás:</span>
      <span class="text-white font-medium">{{ data.maxQuantity | number:'1.0-0' }} {{ data.unit }}</span>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Hozzáadandó mennyiség</label>
      <div class="relative">
        <input
          [(ngModel)]="amount"
          type="number" min="0" placeholder="0"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
        <span class="absolute right-4 top-2.5 text-gray-500 text-sm">{{ data.unit }}</span>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 p-6 border-t border-gray-800">
    <button (click)="cancel()"
      class="px-4 py-2 text-gray-400 hover:text-white text-sm transition-colors">
      Mégse
    </button>
    <button
      (click)="submit()"
      [disabled]="dispatcherService.isSubmitting || !amount"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-xl transition-colors">
      {{ dispatcherService.isSubmitting ? 'Feltöltés...' : 'Feltöltés' }}
    </button>
  </div>

</div>
