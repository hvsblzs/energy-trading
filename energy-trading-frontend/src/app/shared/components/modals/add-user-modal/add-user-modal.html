<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-md">

  <div class="flex items-center justify-between p-6 border-b border-gray-800">
    <div>
      <h2 class="text-white font-semibold">Új felhasználó</h2>
      <p class="text-gray-500 text-xs mt-0.5">{{ data.companyName }}</p>
    </div>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4">

    <!-- Email -->
    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Email cím</label>
      <input 
        [(ngModel)]="form.email"
        type="email"
        placeholder="felhasznalo@ceg.com"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500"
        [class.border-red-500]="errors.email">
      @if (errors.email) {
        <p class="text-red-400 text-xs">{{ errors.email }}</p>
      }
    </div>

    <!-- Jelszó -->
    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Jelszó</label>
      <input 
        [(ngModel)]="form.password"
        type="password"
        placeholder="••••••••"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500"
        [class.border-red-500]="errors.password">
      @if (errors.password) {
        <p class="text-red-400 text-xs">{{ errors.password }}</p>
      }
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 p-6 border-t border-gray-800">
    <button
      (click)="cancel()"
      class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-medium rounded-xl transition-colors">
      Mégse
    </button>
    <button
      (click)="submit()"
      [disabled]="isSubmitting"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm font-medium rounded-xl transition-colors">
      {{ isSubmitting ? 'Létrehozás...' : 'Létrehozás'}}
    </button>
  </div>

</div>
