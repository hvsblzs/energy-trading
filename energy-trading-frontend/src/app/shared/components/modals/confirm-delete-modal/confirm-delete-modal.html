<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-sm">
  <div class="p-6 flex flex-col items-center gap-4">
    <div class="w-12 h-12 rounded-xl bg-red-500/15 border border-red-500/30 flex items-center justify-center">
      <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </div>
    <div class="text-center">
      <h3 class="text-white font-semibold mb-1">{{ data.title }}</h3>
      <p class="text-gray-400 text-sm">
        Biztosan törölni szeretnéd a
        <span class="text-white font-medium">{{ data.itemName }}</span>
        {{ data.message }}
      </p>
    </div>
  </div>

  <div class="flex items-center gap-3 p-6 border-t border-gray-800">
    <button
      (click)="cancel()"
      class="flex-1 px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 text-sm font-medium rounded-xl transition-colors">
      Mégse
    </button>
    <button
      (click)="confirm()"
      class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm font-medium rounded-xl transition-colors">
      Törlés
    </button>
  </div>
</div>
