<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-lg">

  <div class="flex items-center justify-between p-6 border-b border-gray-800">
    <h2 class="text-white font-semibold">Új cég létrehozása</h2>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4 max-h-[60vh] overflow-y-auto custom-scroll">

    <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider">Cég adatok</p>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Cégnév *</label>
      <input [(ngModel)]="form.companyName" type="text" placeholder="Pl. Energia Kft."
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      @if (errors.companyName) { <p class="text-red-400 text-xs">{{ errors.companyName }}</p> }
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-gray-400 text-xs">Email</label>
        <input [(ngModel)]="form.companyEmail" type="email" placeholder="ceg@email.hu"
          class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
        @if (errors.companyEmail) { <p class="text-red-400 text-xs">{{ errors.companyEmail }}</p> }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-gray-400 text-xs">Telefon</label>
        <input [(ngModel)]="form.companyPhone" type="text" placeholder="+36 1 234 5678"
          class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Cím</label>
      <input [(ngModel)]="form.companyAddress" type="text" placeholder="1234 Budapest, Példa utca 1."
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Kezdő kredit</label>
      <input [(ngModel)]="form.creditBalance" type="number" min="0" placeholder="0"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
    </div>

    <p class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mt-2">Felhasználó adatok</p>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Felhasználó email *</label>
      <input [(ngModel)]="form.userEmail" type="email" placeholder="user@email.hu"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      @if (errors.userEmail) { <p class="text-red-400 text-xs">{{ errors.userEmail }}</p> }
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">Jelszó *</label>
      <input [(ngModel)]="form.password" type="password" placeholder="••••••••"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      @if (errors.password) { <p class="text-red-400 text-xs">{{ errors.password }}</p> }
    </div>

  </div>

  <div class="flex items-center justify-end gap-3 p-6 border-t border-gray-800">
    <button (click)="cancel()"
      class="px-4 py-2 text-gray-400 hover:text-white text-sm transition-colors">
      Mégse
    </button>
    <button
      (click)="submit()"
      [disabled]="isSubmitting"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-xl transition-colors">
      {{ isSubmitting ? 'Létrehozás...' : 'Létrehozás' }}
    </button>
  </div>

</div>
