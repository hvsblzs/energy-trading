<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-lg">

  <div class="flex items-center justify-between p-6 border-b border-gray-800">
    <h2 class="text-white font-semibold">{{ 'modals.editCompany.title' | translate }} {{ data.name }}</h2>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4">
    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">{{ 'modals.editCompany.companyName' | translate }}</label>
      <input [(ngModel)]="form.name" type="text"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      @if (errors.name) { <p class="text-red-400 text-xs">{{ errors.name }}</p> }
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-gray-400 text-xs">{{ 'modals.editCompany.email' | translate }}</label>
        <input [(ngModel)]="form.email" type="email"
          class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
        @if (errors.email) { <p class="text-red-400 text-xs">{{ errors.email }}</p> }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-gray-400 text-xs">{{ 'modals.editCompany.phone' | translate }}</label>
        <input [(ngModel)]="form.phone" type="text"
          class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">{{ 'modals.editCompany.address' | translate }}</label>
      <input [(ngModel)]="form.address" type="text"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"/>
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 p-6 border-t border-gray-800">
    <button (click)="cancel()"
      class="px-4 py-2 text-gray-400 hover:text-white text-sm transition-colors">
      {{ 'modals.cancel' | translate }}
    </button>
    <button
      (click)="submit()"
      [disabled]="isSubmitting"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-xl transition-colors">
      {{ isSubmitting ? ('modals.editCompany.submitting' | translate) : ('modals.editCompany.submit' | translate) }}
    </button>
  </div>

</div>
