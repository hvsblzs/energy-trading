<div class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-sm">

  <div class="flex items-center justify-between p-6 border-b border-gray-800">
    <div>
      <h2 class="text-white font-semibold">{{ 'modals.resetPassword.title' | translate }}</h2>
      <p class="text-gray-500 text-xs mt-0.5">{{ data.userEmail }}</p>
    </div>
    <button (click)="cancel()" class="text-gray-500 hover:text-gray-300 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="p-6 flex flex-col gap-4">
    <div class="relative flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">{{ 'modals.resetPassword.newPassword' | translate }}</label>
      <input
        [(ngModel)]="form.newPassword"
        type="{{showPassword ? 'text' : 'password'}}"
        placeholder="••••••••"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"
        [class.border-red-500]="errors.newPassword">
      <button (click)="switchPasswordVisibility()"
        class="absolute right-3 top-8 text-gray-400 hover:text-white transition-colors">
        <lucide-icon [img]="showPassword ? EyeOff : Eye" class="w-5 h-5"></lucide-icon>
      </button>
      @if (errors.newPassword) {
        <p class="text-red-400 text-xs">{{ errors.newPassword }}</p>
      }
    </div>

    <div class="relative flex flex-col gap-1.5">
      <label class="text-gray-400 text-xs">{{ 'modals.resetPassword.confirmPassword' | translate }}</label>
      <input
        [(ngModel)]="form.confirmPassword"
        type="{{showConfirmPassword ? 'text' : 'password'}}"
        placeholder="••••••••"
        class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"
        [class.border-red-500]="errors.confirmPassword">
      <button (click)="switchConfirmPasswordVisibility()"
        class="absolute right-3 top-8 text-gray-400 hover:text-white transition-colors">
        <lucide-icon [img]="showConfirmPassword ? EyeOff : Eye" class="w-5 h-5"></lucide-icon>
      </button>
      @if (errors.confirmPassword) {
        <p class="text-red-400 text-xs">{{ errors.confirmPassword }}</p>
      }
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 p-6 border-t border-gray-800">
    <button (click)="cancel()"
      class="px-4 py-2 text-gray-400 hover:text-white text-sm transition-colors">
      {{ 'modals.cancel' | translate }}
    </button>
    <button
      (click)="submit()"
      [disabled]="isSubmitting"
      class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-xl transition-colors">
      {{ isSubmitting ? ('modals.resetPassword.submitting' | translate) : ('modals.resetPassword.submit' | translate) }}
    </button>
  </div>

</div>
