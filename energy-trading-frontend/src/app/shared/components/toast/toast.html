<div class="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
    @for (toast of toasts; track toast.id) {
        <div 
        class="flex items-center justify-between gap-4 px-4 py-3 rounded-xl shadow-lg text-sm font-medium min-w-64 toast-enter" 
        [ngClass]="toast.type === 'success'
            ? 'bg-green-900 border border-green-700 text-green-300'
            : 'bg-red-900 border border-red-700 text-red-300' ">
            <div class="flex items-center gap-2">
                <span>{{ toast.message }}</span>
            </div>
            <button (click)="remove(toast.id)" class="opacity-60 hover:opacity-100 transition-opacity">✕</button>
        </div>
    }
</div>
